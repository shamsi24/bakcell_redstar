name: iOS SPM Validate

on:
  pull_request:
    paths:
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'lib/**'
      - 'Package.swift'
      - 'Sources/**'
      - 'scripts/build_ios_spm.sh'
      - '.github/workflows/ios-spm-validate.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build iOS xcframeworks
        run: ./scripts/build_ios_spm.sh

      - name: Describe SPM package
        run: swift package describe

      - name: Sanity-check xcframework slices
        run: |
          for fw in ios_spm/Frameworks/*.xcframework; do
            name=$(basename "$fw")
            slices=$(plutil -extract AvailableLibraries raw "$fw/Info.plist" 2>/dev/null || true)
            echo "::group::$name"
            ls "$fw"
            echo "::endgroup::"
          done
