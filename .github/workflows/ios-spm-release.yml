name: iOS SPM Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'ios-v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0). Without leading v.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME#v}"
            V="${V#ios-v}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version: $V"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode.app

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter doctor
        run: flutter --version && flutter doctor -v

      - name: Build iOS xcframeworks
        run: ./scripts/build_ios_spm.sh

      - name: Zip frameworks
        id: zip
        run: |
          V="${{ steps.ver.outputs.version }}"
          ZIP="redstar_module_ios_${V}.xcframeworks.zip"
          cd ios_spm
          zip -r -y "../$ZIP" Frameworks
          cd ..
          SHA=$(shasum -a 256 "$ZIP" | awk '{print $1}')
          echo "zip=$ZIP" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "## iOS SPM artifact" >> "$GITHUB_STEP_SUMMARY"
          echo "- file: \`$ZIP\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- sha256: \`$SHA\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Create / update GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.zip.outputs.zip }}
          body: |
            Built with Flutter (stable) on macos-14.

            **iOS SPM artifact**
            - file: `${{ steps.zip.outputs.zip }}`
            - sha256: `${{ steps.zip.outputs.sha256 }}`

      - name: Upload artifact (workflow_dispatch)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.zip.outputs.zip }}
          path: ${{ steps.zip.outputs.zip }}
          retention-days: 14
