name: redstar_module
description: "by shamsi24"
publish_to: 'none'


version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'


dependencies:
  flutter:
    sdk: flutter

  #State Management
  flutter_bloc: ^9.1.1
  provider: ^6.1.5+1

  #Network
  dio: ^5.9.0

  #Dependecy Injection
  get_it: ^9.2.0

  #UI and Styling
  google_fonts: ^6.3.3
  loading_animation_widget: ^1.3.0
  animations: ^2.1.1
  flutter_svg: 2.3.0

  #Utility
  equatable: ^2.0.8

  #Image Handling
  cached_network_image: ^3.4.1

  #Localization
  easy_localization: ^3.0.8
  intl: ^0.20.2

  #Other
  upgrader: ^12.3.0
  rxdart: ^0.28.0
  dartz: ^0.10.1
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.4
  lottie: ^3.3.2
  lazy_load_indexed_stack: ^1.2.1
  animated_custom_dropdown: ^3.1.1
  flutter_screenutil: ^5.9.3
  retry: ^3.1.2
  infinite_scroll_pagination: ^5.1.1



dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4



flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher_icon/launcher_icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:

  uses-material-design: true

  module:
    androidX: true
    androidPackage: az.kripton.redstar
    iosBundleIdentifier: az.kripton.redstar

  assets:
    - assets/translations/
    - assets/icons/
    - assets/icons/3d_icons/
    - assets/icons/linear_icons/

  fonts:
    - family: Loos
      fonts:
        - asset: assets/fonts/Loos_Normal_Regular_latCyr.ttf
          weight: 400
        - asset: assets/fonts/Loos_Normal_Medium_latCyr.ttf
          weight: 500
        - asset: assets/fonts/Loos_Normal_Bold_latCyr.ttf
          weight: 700
    - family: LoosWide
      fonts:
        - asset: assets/fonts/Loos_Wide_Medium_latCyr.ttf
          weight: 500
        - asset: assets/fonts/Loos_Wide_Bold_latCyr.ttf
          weight: 700


